{% extends 'base.html' %}
{% block content %}
<p>SCREEN SALES</p>
<table border="1">

    <tr>
        <th>Product Name</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Total Price</th>
        <th>Date</th>
    </tr>
    {% for sales in sales_list %}
<tr>
    <td>{{ sales.product }}</td>
    <td>{{sales.product.category}}</td>
    <td>{{ sales.quantity }}</td>
    <td>{{ sales.price }}</td>
    <td>{{ sales.created }}</td>
</tr>
{% endfor %}
</table>


{% endblock %}
